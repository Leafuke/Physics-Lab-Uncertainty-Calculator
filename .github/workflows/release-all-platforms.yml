name: Release Builds

permissions:
  contents: write

on:
  workflow_dispatch:

concurrency:
  group: manual-release
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve Release Metadata
    runs-on: ubuntu-22.04
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Read version from source
        id: meta
        shell: bash
        run: python .github/scripts/release_assets.py version --root . --github-output "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            platform: windows
            runner: windows-2022
            arch: x64
          - label: Linux
            platform: linux
            runner: ubuntu-22.04
            arch: x64
          - label: macOS
            platform: macos
            runner: macos-13
            arch: x64
    env:
      APP_NAME: ${{ needs.metadata.outputs.app_name }}
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYINSTALLER_CONFIG_DIR: ${{ runner.temp }}/pyinstaller
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller py7zr pillow

      - name: Build application
        shell: pwsh
        run: |
          pyinstaller --noconfirm --windowed --name "$env:APP_NAME" --icon assets/app.ico main.py

      - name: Package release archive
        id: package
        shell: pwsh
        run: |
          python .github/scripts/release_assets.py package `
            --root . `
            --platform "${{ matrix.platform }}" `
            --arch "${{ matrix.arch }}" `
            --dist-dir "dist/$env:APP_NAME" `
            --icon-path "assets/app.ico" `
            --output-dir "release" `
            --github-output "$env:GITHUB_OUTPUT"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - metadata
      - build
    runs-on: ubuntu-22.04
    env:
      APP_TAG: ${{ needs.metadata.outputs.tag }}
      APP_VERSION: ${{ needs.metadata.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Generate release notes
        shell: bash
        run: python .github/scripts/release_assets.py notes --root . --output release_notes.md

      - name: Create or update release
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -maxdepth 1 -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "$APP_TAG" >/dev/null 2>&1; then
            gh release edit "$APP_TAG" --title "$APP_VERSION" --notes-file release_notes.md
            gh release upload "$APP_TAG" "${files[@]}" --clobber
          else
            gh release create "$APP_TAG" "${files[@]}" --title "$APP_VERSION" --notes-file release_notes.md
          fi